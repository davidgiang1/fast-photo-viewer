name: Build and Release

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Guard - dispatch only from master
        if: github.event_name == 'workflow_dispatch' && github.ref_name != 'master'
        shell: bash
        run: |
          echo "::error::workflow_dispatch releases must run on master, got '${{ github.ref_name }}'"
          exit 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            BUMP="${{ inputs.bump }}"
            BUMP="${BUMP:-patch}"
            cargo install cargo-edit --locked
            cargo set-version --bump "$BUMP"
            VERSION=$(cargo pkgid | sed -E 's/.*[#@]([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing v$VERSION"

      - name: Download FFmpeg shared build
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-win64-gpl-shared-7.1.zip"
          unzip -q ffmpeg.zip -d ffmpeg7

      - name: Build release binary
        shell: bash
        run: |
          export FFMPEG_DIR="${GITHUB_WORKSPACE}/ffmpeg7/ffmpeg-n7.1-latest-win64-gpl-shared-7.1"
          cargo build --release

      - name: Stage DLLs for installer
        shell: bash
        run: |
          mkdir -p dlls
          cp ffmpeg7/ffmpeg-n7.1-latest-win64-gpl-shared-7.1/bin/*.dll dlls/
          cp target/release/SDL2.dll dlls/

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /dMyAppVersion=${{ steps.version.outputs.VERSION }} installer\setup.iss

      - name: Commit bump and push tag
        if: github.ref_type != 'tag'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: release v${{ steps.version.outputs.VERSION }}"
          git tag "v${{ steps.version.outputs.VERSION }}"
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.VERSION }}"
          name: "Fast Photo Viewer v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            output/FastPhotoViewer-*-setup.exe
          body: |
            ### Installation
            1. Download `FastPhotoViewer-${{ steps.version.outputs.VERSION }}-setup.exe`
            2. Run the installer
            3. Choose which file types to associate (images checked by default, videos optional)
            4. To set as your default viewer, go to **Windows Settings > Default Apps** and search for **Fast Photo Viewer**

            ### Supported Formats
            **Images:** jpg, jpeg, png, bmp, webp, gif, tiff, ico, svg
            **Videos:** mp4, mkv, avi, mov, wmv, flv, webm, m4v, mpg, mpeg, 3gp, ogv, vob

            ---
